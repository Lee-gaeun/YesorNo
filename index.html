<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>기깔난 밥 사주기</title>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #fff4e6, #ffe3e3, #f3d9fa);
        overflow: hidden;
      }

      .container {
        width: min(90vw, 700px);
        text-align: center;
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(14px);
        border-radius: 32px;
        padding: 48px 28px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
      }

      h1 {
        margin: 0 0 24px;
        font-size: clamp(2rem, 4vw, 3.2rem);
        color: #3b2f2f;
      }

      .button-area {
        display: flex;
        justify-content: center;
        gap: 20px;
      }

      button {
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        font-weight: 700;
      }

      #yesBtn {
        padding: 18px 36px;
        font-size: 1.2rem;
        border-radius: 999px;
        background: #ff6b6b;
        color: white;
        box-shadow: 0 10px 25px rgba(255, 107, 107, 0.35);
      }

      /* hover + 클릭 효과 */
      #yesBtn:hover {
        transform: scale(1.08);
        box-shadow: 0 14px 30px rgba(255, 107, 107, 0.45);
      }

      #yesBtn:active {
        transform: scale(0.95);
        box-shadow: 0 6px 15px rgba(255, 107, 107, 0.3);
      }

      #noBtn {
        padding: 16px 28px;
        font-size: 1rem;
        border-radius: 999px;
        background: white;
        color: #444;
        border: 2px solid #ffd8a8;
      }

      .message {
        margin-top: 20px;
        min-height: 40px;
        font-size: 1.2rem;
        font-weight: 700;
        color: #d9480f;
      }

      .emoji {
        font-size: 4rem;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="emoji">🍚✨</div>
      <h1>가은이에게 기깔난 밥 사주기</h1>

      <div class="button-area">
        <button id="yesBtn">Yes!😎</button>
        <button id="noBtn">No..</button>
      </div>

      <div class="message" id="message"></div>
    </div>

    <script>
      const yesBtn = document.getElementById("yesBtn");
      const noBtn = document.getElementById("noBtn");
      const message = document.getElementById("message");

      let moveCount = 0;
      let escaped = false; // 처음에는 고정 안됨

      function moveNoButton() {
        const btnRect = noBtn.getBoundingClientRect();

        const maxX = window.innerWidth - btnRect.width;
        const maxY = window.innerHeight - btnRect.height;

        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;

        noBtn.style.left = `${randomX}px`;
        noBtn.style.top = `${randomY}px`;
      }

      noBtn.addEventListener("mouseenter", () => {
        // 처음 도망칠 때 fixed로 변경
        if (!escaped) {
          noBtn.style.position = "fixed";
          escaped = true;
        }

        moveNoButton();
        moveCount++;

        const teasingMessages = [
          "ㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋ잡아봐라",
          "아니 왜 No 누르는데 ㅋㅋㅋ",
          "포기해 그냥 Yes 눌러",
          "No는 허상이다",
          "밥 사줄 운명임",
          "ㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋㅋ잡아봐라",
          "잡을 수 있으면 잡아봐라",
          "애쓴다 !!!"
        ];

        message.textContent = teasingMessages[moveCount % teasingMessages.length];
      });

      noBtn.addEventListener("click", (e) => {
        e.preventDefault();
        moveNoButton();
      });

      yesBtn.addEventListener("click", () => {
        message.innerHTML = "좋아 😆 메뉴는 <strong>기깔나게</strong> ㄱㄱ";
        yesBtn.textContent = "약속 완료 💖";
        noBtn.style.display = "none";
      });
    </script>
  </body>
</html>
